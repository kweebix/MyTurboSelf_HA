blueprint:
  name: "Alerte Repas TurboSelf Bas"
  description: >
    Envoie une notification sur votre téléphone quand le nombre de repas restants descend en dessous du seuil ou si le solde est négatif.
  domain: automation
  source_url: https://github.com/kweebix/MyTurboSelf_HA/blob/main/blueprints/automation/myturboself_low_balance.yaml
  input:
    meals_sensor:
      name: "Capteur de repas restants"
      selector:
        entity:
          integration: myturboself
          domain: sensor
    threshold:
      name: "Seuil d'alerte"
      default: 3
      selector:
        number:
          min: 0
          max: 20
          unit_of_measurement: "repas"
          mode: box
    balance_sensor:
      name: "(Optionnel) Capteur de solde"
      default:
      selector:
        entity:
          integration: myturboself
          domain: sensor
          device_class: monetary
    notify_service:
      name: "Service de notification"
      description: "Le nom du service (ex: notify.mobile_app_votre_tel). Utilisez 'notify.notify' pour tous les appareils."
      default: "notify.notify"
      selector:
        text: {}
    actions:
      name: "Actions additionnelles"
      description: "Autres actions à exécuter."
      default: []
      selector:
        action: {}

variables:
  meals_entity: !input meals_sensor
  balance_entity: !input balance_sensor

trigger:
  - platform: numeric_state
    entity_id: !input meals_sensor
    below: !input threshold
  - platform: numeric_state
    entity_id: !input balance_sensor
    below: 0

action:
  - service: !input notify_service
    data:
      title: >-
        {% if states(meals_entity) | int < 0 %}
          ⚠️ DETTE TURBO-SELF ⚠️
        {% else %}
          🍴 Alerte TurboSelf
        {% endif %}
      message: >-
        {% if states(meals_entity) | int < 0 %}
          Attention ! Votre compte est à découvert de {{ states(meals_entity) | int | abs }} repas (Solde : {{ states(balance_entity) }}€). 
          Veuillez recharger rapidement.
        {% else %}
          Il ne reste que {{ states(meals_entity) }} repas sur le compte.
          {% if balance_entity != none %} (Solde restant : {{ states(balance_entity) }}€){% endif %}
        {% endif %}
      data:
        image: "https://raw.githubusercontent.com/kweebix/MyTurboSelf_HA/main/brand/icon.png"
        notification_icon: "mdi:silverware-fork-knife"
        clickAction: "https://espacenumerique.turbo-self.com/Connexion.aspx"
        url: "https://espacenumerique.turbo-self.com/Connexion.aspx"
        priority: high
        ttl: 0
  - choose: []
    default: !input actions

mode: single
