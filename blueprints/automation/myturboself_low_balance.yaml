blueprint:
  name: "Alerte Repas TurboSelf Bas"
  description: >
    Envoie une notification sur votre téléphone quand le nombre de repas restants descend en dessous du seuil.
    
    Pour recevoir la notification sur votre téléphone :
    1. Allez dans Outils de développement > Services.
    2. Cherchez "notify.mobile_app_" pour trouver le nom de votre téléphone.
    3. Copiez ce nom (ex: notify.mobile_app_iphone_de_thomas) dans le champ ci-dessous.
  domain: automation
  source_url: https://github.com/kweebix/MyTurboSelf_HA/blob/main/blueprints/automation/myturboself_low_balance.yaml
  input:
    meals_sensor:
      name: "Capteur de repas restants"
      selector:
        entity:
          integration: myturboself
          domain: sensor
    threshold:
      name: "Seuil d'alerte"
      default: 3
      selector:
        number:
          min: 0
          max: 20
          unit_of_measurement: "repas"
          mode: box
    balance_sensor:
      name: "(Optionnel) Capteur de solde"
      default:
      selector:
        entity:
          integration: myturboself
          domain: sensor
          device_class: monetary
    notify_service:
      name: "Service de notification"
      description: "Le nom du service (ex: notify.mobile_app_votre_tel). Par défaut : notification dans l'interface Home Assistant."
      default: "notify.persistent_notification"
      selector:
        text: {}
    actions:
      name: "Actions additionnelles"
      description: "Autres actions à exécuter (ex: allumer une lumière)."
      default: []
      selector:
        action: {}

variables:
  meals_entity: !input meals_sensor
  meals: "{{ states(meals_entity) }}"
  balance_entity: !input balance_sensor
  balance: >
    {% if balance_entity != none %}
      {{ states(balance_entity) }}
    {% else %}
      N/A
    {% endif %}
  # URL du logo haute résolution pour l'affichage sur mobile
  logo_url: "https://raw.githubusercontent.com/kweebix/MyTurboSelf_HA/main/brand/icon.png"

trigger:
  - platform: numeric_state
    entity_id: !input meals_sensor
    below: !input threshold

action:
  - service: !input notify_service
    data:
      title: "🍴 Alerte TurboSelf"
      message: "Il ne reste que {{ meals }} repas sur le compte. (Solde : {{ balance }}€)"
      data:
        # Pour iOS et Android
        image: "{{ logo_url }}"
        # Icône pour la barre de statut (Android)
        notification_icon: "mdi:silverware-fork-knife"
        # Action au clic : ouvre le site TurboSelf
        clickAction: "https://espacenumerique.turbo-self.com/Connexion.aspx"
        url: "https://espacenumerique.turbo-self.com/Connexion.aspx"
  - choose: []
    default: !input actions

mode: single
