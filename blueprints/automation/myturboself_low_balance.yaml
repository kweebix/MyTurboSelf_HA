blueprint:
  name: "Alerte Repas TurboSelf Bas"
  description: "Envoie une notification quand le nombre de repas restants sur votre compte TurboSelf descend en dessous d'un certain seuil."
  domain: automation
  input:
    meals_sensor:
      name: "Capteur de repas restants"
      description: "Le capteur 'Repas restants' de MyTurboSelf (ex: sensor.prenom_nom_repas_restants)."
      selector:
        entity:
          integration: myturboself
          domain: sensor
    threshold:
      name: "Seuil d'alerte (nombre de repas)"
      description: "L'alerte sera envoyée quand le nombre de repas est strictement inférieur à ce seuil."
      default: 3
      selector:
        number:
          min: 0
          max: 20
          unit_of_measurement: "repas"
          mode: box
    balance_sensor:
      name: "(Optionnel) Capteur de solde"
      description: "Le capteur de solde pour afficher le montant restant dans la notification."
      default: ""
      selector:
        entity:
          integration: myturboself
          domain: sensor
          device_class: monetary
    actions:
      name: "Actions"
      description: "Actions à exécuter (ex: envoyer une notification). Vous pouvez utiliser {{ meals }} pour le nombre de repas et {{ balance }} pour le solde actuel."
      selector:
        action: {}

variables:
  # On récupère les valeurs pour les rendre disponibles dans les actions
  meals_entity: !input meals_sensor
  meals: "{{ states(meals_entity) }}"
  balance_entity: !input balance_sensor
  balance: "{{ states(balance_entity) if balance_entity != '' else 'N/A' }}"

trigger:
  - platform: numeric_state
    entity_id: !input meals_sensor
    below: !input threshold

action: !input actions

mode: single
